# ───────────────────────────────────────────────────────────
#  Mimz Backend — Cloud Build CI/CD Pipeline
#  Triggers on push to main branch.
#  Builds, deploys, and verifies the backend on Cloud Run.
# ───────────────────────────────────────────────────────────

steps:
  # Step 1: Install dependencies and run tests
  - name: 'node:20-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd backend
        npm ci
        npm test
        echo "✅ All tests passed"

  # Step 2: Build the production Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mimz-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/mimz-backend:latest'
      - './backend'

  # Step 3: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mimz-backend:$SHORT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/mimz-backend:latest'

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'mimz-backend'
      - '--image=gcr.io/$PROJECT_ID/mimz-backend:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production,GCP_PROJECT_ID=$PROJECT_ID,LOG_LEVEL=info,GEMINI_LIVE_MODEL=gemini-2.5-flash-native-audio-preview-12-2025,GEMINI_MODEL=gemini-2.5-flash'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'

  # Step 5: Verify deployment
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVICE_URL=$(gcloud run services describe mimz-backend \
          --region=europe-west1 \
          --format='value(status.url)')
        echo "Service URL: $SERVICE_URL"
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/readyz")
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Health check passed"
        else
          echo "❌ Health check failed: $HTTP_CODE"
          exit 1
        fi

images:
  - 'gcr.io/$PROJECT_ID/mimz-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/mimz-backend:latest'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: '600s'

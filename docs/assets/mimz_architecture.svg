<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="leftCol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1d36"/>
      <stop offset="100%" stop-color="#0b162a"/>
    </linearGradient>
    <linearGradient id="midCol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2230"/>
      <stop offset="100%" stop-color="#0b1a26"/>
    </linearGradient>
    <linearGradient id="rightCol" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10231f"/>
      <stop offset="100%" stop-color="#0a1b18"/>
    </linearGradient>
    <style>
      text { font-family: Inter, "SF Pro Display", "Segoe UI", Arial, sans-serif; }
      .title { fill: #f8fafc; font-size: 46px; font-weight: 800; letter-spacing: 0.5px; }
      .subtitle { fill: #94a3b8; font-size: 18px; font-weight: 500; }
      .colTitle { font-size: 24px; font-weight: 700; }
      .cardTitle { fill: #e2e8f0; font-size: 18px; font-weight: 700; }
      .cardText { fill: #94a3b8; font-size: 14px; }
      .small { fill: #64748b; font-size: 12px; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.22"/>

  <text x="960" y="70" text-anchor="middle" class="title">MIMZ - SYSTEM ARCHITECTURE</text>
  <text x="960" y="102" text-anchor="middle" class="subtitle">Flutter Mobile App -> Cloud Run Fastify Backend -> Gemini Live + Firebase</text>

  <!-- Columns -->
  <rect x="40" y="130" rx="20" ry="20" width="560" height="860" fill="url(#leftCol)" stroke="#2563eb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="680" y="130" rx="20" ry="20" width="560" height="860" fill="url(#midCol)" stroke="#0891b2" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1320" y="130" rx="20" ry="20" width="560" height="860" fill="url(#rightCol)" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>

  <text x="320" y="180" text-anchor="middle" class="colTitle" fill="#93c5fd">Flutter Mobile App</text>
  <text x="320" y="205" text-anchor="middle" class="small">iOS + Android | Riverpod | go_router</text>

  <text x="960" y="180" text-anchor="middle" class="colTitle" fill="#67e8f9">Backend on Cloud Run</text>
  <text x="960" y="205" text-anchor="middle" class="small">Node.js + TypeScript | Fastify | Zod validation</text>

  <text x="1600" y="180" text-anchor="middle" class="colTitle" fill="#6ee7b7">Google Cloud Services</text>
  <text x="1600" y="205" text-anchor="middle" class="small">Gemini Live API | Firestore | Firebase Auth | Secret Manager</text>

  <!-- Left cards -->
  <rect x="70" y="240" rx="14" ry="14" width="500" height="110" fill="#132b52" stroke="#3b82f6"/>
  <text x="95" y="275" class="cardTitle">UI Layer (World, Play, Squad, Events, Profile)</text>
  <text x="95" y="302" class="cardText">20+ screens with map growth, rewards, onboarding and live modes</text>
  <text x="95" y="325" class="cardText">State updates stream from session + backend providers</text>

  <rect x="70" y="370" rx="14" ry="14" width="500" height="145" fill="#123057" stroke="#60a5fa"/>
  <text x="95" y="403" class="cardTitle">LiveSessionController (orchestration core)</text>
  <text x="95" y="430" class="cardText">Permissions -> token fetch -> websocket connect -> mic/camera</text>
  <text x="95" y="453" class="cardText">Handles barge-in, reconnect policy, turn detection, session caps</text>
  <text x="95" y="476" class="cardText">Bridges tool_call responses via backend tool bridge endpoint</text>

  <rect x="70" y="535" rx="14" ry="14" width="240" height="120" fill="#1f2937" stroke="#334155"/>
  <text x="92" y="570" class="cardTitle">Audio Capture</text>
  <text x="92" y="595" class="cardText">PCM 16kHz mono</text>
  <text x="92" y="618" class="cardText">Waveform + silence gate</text>

  <rect x="330" y="535" rx="14" ry="14" width="240" height="120" fill="#1f2937" stroke="#334155"/>
  <text x="352" y="570" class="cardTitle">Camera Stream</text>
  <text x="352" y="595" class="cardText">Frames -> JPEG -> Base64</text>
  <text x="352" y="618" class="cardText">Vision Quest input</text>

  <rect x="70" y="675" rx="14" ry="14" width="240" height="120" fill="#1f2937" stroke="#334155"/>
  <text x="92" y="710" class="cardTitle">LiveWebSocketClient</text>
  <text x="92" y="735" class="cardText">Bidi audio + image stream</text>
  <text x="92" y="758" class="cardText">Receives model events</text>

  <rect x="330" y="675" rx="14" ry="14" width="240" height="120" fill="#1f2937" stroke="#334155"/>
  <text x="352" y="710" class="cardTitle">LiveTokenClient + ToolBridge</text>
  <text x="352" y="735" class="cardText">POST /live/ephemeral-token</text>
  <text x="352" y="758" class="cardText">POST /live/tool-execute</text>

  <rect x="70" y="815" rx="14" ry="14" width="500" height="120" fill="#2b1b0e" stroke="#ea580c"/>
  <text x="95" y="850" class="cardTitle">Firebase Auth SDK + API Client</text>
  <text x="95" y="875" class="cardText">Bearer JWT on requests to Cloud Run backend</text>
  <text x="95" y="898" class="cardText">Production base URL points to Cloud Run service</text>

  <!-- Middle cards -->
  <rect x="710" y="240" rx="14" ry="14" width="500" height="110" fill="#12344a" stroke="#06b6d4"/>
  <text x="735" y="275" class="cardTitle">/live/ephemeral-token</text>
  <text x="735" y="302" class="cardText">Mints short-lived session token + model + systemInstruction</text>
  <text x="735" y="325" class="cardText">Personalizes from user profile (interests, difficulty, name)</text>

  <rect x="710" y="370" rx="14" ry="14" width="500" height="130" fill="#12344a" stroke="#06b6d4"/>
  <text x="735" y="403" class="cardTitle">/live/tool-execute + executeLiveTool.ts</text>
  <text x="735" y="430" class="cardText">Validates tool args via Zod schemas (15 typed tools)</text>
  <text x="735" y="453" class="cardText">Runs handlers: quiz, onboarding, vision, rewards, district</text>
  <text x="735" y="476" class="cardText">Returns structured tool response back to live session</text>

  <rect x="710" y="520" rx="14" ry="14" width="500" height="130" fill="#1f2937" stroke="#334155"/>
  <text x="735" y="553" class="cardTitle">Game service + Idempotency guard</text>
  <text x="735" y="580" class="cardText">Correlation ID cache prevents duplicate grant/reward writes</text>
  <text x="735" y="603" class="cardText">Enforces reward, territory and streak safety caps</text>
  <text x="735" y="626" class="cardText">Audit logs for tool actions and session lifecycle events</text>

  <rect x="710" y="670" rx="14" ry="14" width="500" height="125" fill="#1f2937" stroke="#334155"/>
  <text x="735" y="703" class="cardTitle">REST API routes + middleware/auth.ts</text>
  <text x="735" y="730" class="cardText">health, auth, profile, district, squad, events, rewards, notifications</text>
  <text x="735" y="753" class="cardText">verifyIdToken in production; dev fallback in non-production</text>
  <text x="735" y="776" class="cardText">Rate limit + structured logging + hardened error handling</text>

  <rect x="710" y="815" rx="14" ry="14" width="500" height="120" fill="#172630" stroke="#0ea5e9"/>
  <text x="735" y="850" class="cardTitle">Cloud-native deployment</text>
  <text x="735" y="875" class="cardText">Cloud Build pipeline -> image -> Cloud Run deploy -> health check</text>
  <text x="735" y="898" class="cardText">Config from env + Secret Manager, no keys in source control</text>

  <!-- Right cards -->
  <rect x="1350" y="240" rx="14" ry="14" width="500" height="150" fill="#0f2b24" stroke="#10b981" stroke-width="2"/>
  <text x="1375" y="275" class="cardTitle">Gemini 2.5 Flash Native Audio</text>
  <text x="1375" y="302" class="cardText">Bidi WebSocket session for real-time voice + vision interaction</text>
  <text x="1375" y="325" class="cardText">Model sends audio responses and tool_call events</text>
  <text x="1375" y="348" class="cardText">App sends audio chunks, camera frames, and tool_response payloads</text>
  <text x="1375" y="371" class="cardText">Live model: gemini-2.5-flash-native-audio-preview-12-2025</text>

  <rect x="1350" y="410" rx="14" ry="14" width="500" height="145" fill="#2a2008" stroke="#f59e0b"/>
  <text x="1375" y="445" class="cardTitle">Cloud Firestore</text>
  <text x="1375" y="472" class="cardText">Persistent game state: users, districts, rounds, rewards, notifications</text>
  <text x="1375" y="495" class="cardText">Reads for personalization, writes from validated tool execution</text>
  <text x="1375" y="518" class="cardText">Realtime-friendly data model for map growth and progression</text>
  <text x="1375" y="541" class="cardText">Accessed through Firebase Admin SDK on backend</text>

  <rect x="1350" y="575" rx="14" ry="14" width="500" height="105" fill="#2b1b0e" stroke="#ea580c"/>
  <text x="1375" y="610" class="cardTitle">Firebase Authentication</text>
  <text x="1375" y="637" class="cardText">Issues user JWTs; backend verifies on protected requests</text>
  <text x="1375" y="660" class="cardText">Google and Email sign-in paths in app</text>

  <rect x="1350" y="700" rx="14" ry="14" width="240" height="115" fill="#1f2937" stroke="#6366f1"/>
  <text x="1372" y="735" class="cardTitle">Secret Manager</text>
  <text x="1372" y="760" class="cardText">GEMINI_API_KEY</text>
  <text x="1372" y="783" class="cardText">injected at deploy/runtime</text>

  <rect x="1610" y="700" rx="14" ry="14" width="240" height="115" fill="#1f2937" stroke="#22c55e"/>
  <text x="1632" y="735" class="cardTitle">Cloud Build + Registry</text>
  <text x="1632" y="760" class="cardText">test -> build -> push</text>
  <text x="1632" y="783" class="cardText">deploy to Cloud Run</text>

  <rect x="1350" y="835" rx="14" ry="14" width="500" height="100" fill="#162229" stroke="#334155"/>
  <text x="1375" y="870" class="cardTitle">Security boundary</text>
  <text x="1375" y="895" class="cardText">Model suggestions never write directly; backend validation is authoritative</text>
  <text x="1375" y="918" class="cardText">Critical game mutations are guarded, audited, and idempotent</text>

  <!-- Inter-column flow arrows -->
  <line x1="575" y1="730" x2="705" y2="430" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrowCyan)"/>
  <text x="600" y="570" class="small" fill="#22d3ee">WSS setup + session config</text>

  <line x1="575" y1="735" x2="705" y2="735" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="605" y="722" class="small" fill="#38bdf8">POST /live/tool-execute</text>

  <line x1="575" y1="874" x2="705" y2="755" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowAmber)"/>
  <text x="585" y="845" class="small" fill="#f59e0b">JWT bearer auth</text>

  <line x1="1215" y1="300" x2="1345" y2="300" stroke="#34d399" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <text x="1240" y="286" class="small" fill="#34d399">Live websocket traffic</text>

  <line x1="1345" y1="335" x2="1215" y2="355" stroke="#22d3ee" stroke-width="4" marker-end="url(#arrowCyan)"/>
  <text x="1238" y="346" class="small" fill="#22d3ee">Audio + tool_call back</text>

  <line x1="1215" y1="435" x2="1345" y2="485" stroke="#38bdf8" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="1238" y="472" class="small" fill="#38bdf8">Firestore reads/writes</text>

  <line x1="1215" y1="760" x2="1345" y2="625" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowAmber)"/>
  <text x="1235" y="706" class="small" fill="#f59e0b">verifyIdToken</text>

  <line x1="1215" y1="870" x2="1345" y2="750" stroke="#a78bfa" stroke-width="3" marker-end="url(#arrowBlue)"/>
  <text x="1228" y="848" class="small" fill="#a78bfa">Secret + deploy config</text>

  <!-- Footer legend -->
  <line x1="40" y1="1015" x2="1880" y2="1015" stroke="#334155"/>
  <line x1="60" y1="1040" x2="115" y2="1040" stroke="#38bdf8" stroke-width="3"/>
  <text x="125" y="1045" class="small">HTTPS / API calls</text>
  <line x1="330" y1="1040" x2="385" y2="1040" stroke="#22d3ee" stroke-width="4"/>
  <text x="395" y="1045" class="small">WebSocket real-time stream</text>
  <line x1="670" y1="1040" x2="725" y2="1040" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="735" y="1045" class="small">Auth / token verification</text>
  <line x1="1030" y1="1040" x2="1085" y2="1040" stroke="#34d399" stroke-width="4"/>
  <text x="1095" y="1045" class="small">Gemini Live model stream</text>
  <text x="1880" y="1045" text-anchor="end" class="small">Mimz | Hackathon Architecture | 16:9</text>
</svg>

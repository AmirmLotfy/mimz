<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=Fraunces:opsz,wght@9..144,400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13", // Persimmon Hit base
                        "background-light": "#F7F4ED", // Cloud Base
                        "background-dark": "#151417", // Deep Ink
                        "moss": "#5E7442",
                        "lime-pop": "#C8F169",
                        "persimmon": "#F26A3D",
                        "ink": "#151417"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "serif": ["Fraunces", "serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .map-bg {
            background-color: #F7F4ED;
            background-image: radial-gradient(#d1cdbc 1px, transparent 1px), linear-gradient(to right, #e8e4d5 1px, transparent 1px), linear-gradient(to bottom, #e8e4d5 1px, transparent 1px);
            background-size: 40px 40px, 100px 100px, 100px 100px;
        }
        .district-boundary {
            border: 3px solid #5E7442;
            background: rgba(94, 116, 66, 0.05);
            box-shadow: 0 0 40px rgba(94, 116, 66, 0.2);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-ink dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Full-bleed Map Background -->
<div class="absolute inset-0 map-bg z-0" data-alt="Stylized map with muted cream roads and green parks" data-location="Verdant Reach District" style="">
<!-- District Highlight -->
<div class="absolute top-1/4 left-1/4 w-1/2 h-1/2 rounded-full district-boundary flex items-center justify-center">
<span class="bg-moss/10 text-moss font-bold px-4 py-2 rounded-full text-xs uppercase tracking-widest">Active Zone</span>
</div>
</div>
<!-- Top Navigation Overlay -->
<div class="relative z-10 flex flex-col w-full p-4 pt-6 gap-4">
<div class="flex justify-between items-start">
<!-- District Name -->
<div class="flex flex-col">
<h1 class="font-serif text-3xl font-bold text-ink dark:text-white leading-none">Verdant Reach</h1>
<p class="text-[10px] uppercase tracking-widest font-bold text-moss mt-1 opacity-70">Sector 07 • Atlas Street</p>
</div>
<!-- Profile Medallion -->
<div class="flex flex-col items-end gap-2">
<div class="size-12 rounded-full border-2 border-white shadow-lg overflow-hidden bg-slate-200" data-alt="User profile avatar close up">
<img alt="Avatar" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuByRG-9zPZw14rEdskmi5_qKFjv0JwTgJFUGi37mD800rrgdt0lkg_XnjLmpap2auSgXG_rXE06Smj2qyAFjFEhxSiKMnOpjcEuWp2OBIn0sGWViFNe77WdwD_bp1i4xDJFnO1BmDSIzjWhedQzXeIRTRYnyfYo_5HCzDKCEAe1d_NS25E0tH-S-OUyT4WOzdJYvP1V3e8WOXd3BTogEyQ2h8YK0t8gMfXh9gU0HfvbSrOq0P3XoBg_YHhkpdJ9sUUO-nKg7_Gfr_-F"/>
</div>
</div>
</div>
<!-- Live Event Chip -->
<div class="flex justify-center w-full">
<div class="flex items-center gap-1.5 bg-lime-pop px-4 py-1.5 rounded-full shadow-sm border border-black/5">
<span class="material-symbols-outlined text-[16px] animate-pulse text-ink">sensors</span>
<span class="text-ink text-xs font-bold uppercase tracking-tight">Live Event: Neon Harvest</span>
</div>
</div>
</div>
<!-- Middle Interaction Layer -->
<div class="relative z-10 flex-1 flex items-center justify-end flex-col pb-48">
<!-- Search & Controls (Floating right) -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-3">
<button class="size-12 bg-white dark:bg-ink rounded-full shadow-xl flex items-center justify-center text-ink dark:text-white">
<span class="material-symbols-outlined">my_location</span>
</button>
<button class="size-12 bg-white dark:bg-ink rounded-full shadow-xl flex items-center justify-center text-ink dark:text-white">
<span class="material-symbols-outlined">layers</span>
</button>
<div class="flex flex-col bg-white dark:bg-ink rounded-2xl shadow-xl overflow-hidden">
<button class="size-12 flex items-center justify-center text-ink dark:text-white border-b border-slate-100 dark:border-slate-800">
<span class="material-symbols-outlined">add</span>
</button>
<button class="size-12 flex items-center justify-center text-ink dark:text-white">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<!-- Floating Play CTA -->
<div class="relative">
<button class="group relative flex items-center justify-center gap-3 bg-moss hover:bg-moss/90 text-white px-10 py-5 rounded-full shadow-[0_20px_50px_rgba(94,116,66,0.3)] transition-all">
<span class="material-symbols-outlined text-3xl">play_arrow</span>
<span class="text-xl font-bold tracking-tight">PLAY</span>
<!-- Persimmon Notification Dot -->
<div class="absolute -top-1 -right-1 size-5 bg-persimmon rounded-full border-4 border-background-light dark:border-background-dark"></div>
</button>
</div>
</div>
<!-- Bottom Sheet Preview -->
<div class="relative z-20 w-full px-4 mb-2">
<div class="bg-white/90 dark:bg-ink/90 backdrop-blur-md rounded-t-3xl p-4 pb-2 border-t border-x border-white/20 shadow-2xl">
<div class="w-12 h-1 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-4"></div>
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="size-10 bg-moss/20 rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-moss">potted_plant</span>
</div>
<div>
<p class="text-[10px] font-bold text-moss uppercase">Current Mission</p>
<h3 class="text-sm font-bold text-ink dark:text-white">The Verdant Sproutlings</h3>
</div>
</div>
<div class="text-right">
<p class="text-xs font-bold text-ink dark:text-white">450m away</p>
<p class="text-[10px] text-slate-500">2/5 Collected</p>
</div>
</div>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="relative z-30 flex items-center justify-around bg-white dark:bg-ink border-t border-slate-100 dark:border-slate-800 px-2 py-3 pb-8">
<a class="flex flex-col items-center gap-1 text-moss" href="#">
<span class="material-symbols-outlined !fill-1">public</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">World</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-moss transition-colors" href="#">
<span class="material-symbols-outlined">play_circle</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Play</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-moss transition-colors" href="#">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Squad</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-moss transition-colors" href="#">
<span class="material-symbols-outlined">calendar_today</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Events</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400 hover:text-moss transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Me</span>
</a>
</nav>
</div>
</body></html>
